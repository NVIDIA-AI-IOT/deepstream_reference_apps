#
# Configuration for gstnvvllmvlm.py
# VLM Plugin Configuration

# Model Configuration
model:
  # HuggingFace model path/ID
  path: "nvidia/Cosmos-Reason2-8B"

  # Maximum model context length
  max_model_len: 20480

  # Trust remote code when loading model
  trust_remote_code: true

  # GPU memory utilization (0.0 to 1.0)
  gpu_memory_utilization: 0.7

  # GPU device ID to use (-1 for auto from CUDA_VISIBLE_DEVICES, 0-15 for specific GPU)
  gpu_id: 0

  # Video mode: 1 = use video metadata (multi-frame), 0 = image-only mode (to pass frames as images to VLLM)
  # Set to 0 for models that don't support video
  # Set to 1 for models that support video
  video_mode: 1

  # Tensor format for image inputs: "pytorch", "pil", or "numpy"
  # Note: Video mode (video_mode=1, multi-frame) always uses PyTorch tensors
  # Image modes can use any format based on model requirements
  tensor_format: "pytorch"

# Segment Processing Configuration
segment:
  # Length of each segment in seconds
  length_sec: 10

  # Overlap between consecutive segments in seconds
  overlap_sec: 0

  # Keep every Nth frame (subsample interval)
  subsample_interval: 1

  # Target frames per second per segment (0 = disabled, use subsample_interval instead)
  selection_fps: 1

# Inference Configuration
inference:
  # User prompt with optional placeholders: {num_frames}, {stream_id}, {timestamps}
  # Control timestamp inclusion by using or omitting {timestamps} placeholder
  user_prompt: "Describe what you see in detail"

  # System prompt (optional - omit for no system prompt)
  # system_prompt:

  # Sampling parameters (all optional)
  # Max tokens
  max_tokens: 2048

  # Temperature
  temperature: 0.7

  # Top-p (nucleus) sampling
  top_p: 0.9

  # Top-k sampling
  top_k: 100

  # Repetition penalty
  repetition_penalty: 1.1

  # Per-stream prompt overrides (optional)
  # stream_prompts:
  #   0:  # Stream 0
  #     user_prompt: "Frames are sampled at {timestamps}: Monitor for warehouse safety hazards."
  #     system_prompt: "You are a warehouse analyst."
  #   1:  # Stream 1
  #     user_prompt: "Analyse traffic flow"  # No {timestamps} = no timestamps

# Pipeline Configuration
pipeline:
  # Maximum size of inference queue
  queue_maxsize: 20

  # Maximum wait time for segment completion during shutdown (seconds)
  max_wait_timeout: 300

# Video Configuration
video:
  # Default FPS if not detected from stream
  default_fps_numerator: 30
  default_fps_denominator: 1
